<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BSS Operation Center — Download</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0f14;
      color: #e0eaf2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #111a24;
      border: 1px solid #1e3045;
      border-radius: 16px;
      padding: 32px 28px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    img {
      height: 44px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    p {
      font-size: 13px;
      color: #5a7a8a;
      margin-bottom: 20px;
    }

    .version {
      display: inline-block;
      background: rgba(0, 180, 255, 0.1);
      border: 1px solid rgba(0, 180, 255, 0.2);
      color: #00b4ff;
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 100px;
      margin-bottom: 24px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px;
      background: #00b4ff;
      color: #000;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
      margin-bottom: 10px;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .info {
      font-size: 12px;
      color: #5a7a8a;
    }

    .divider {
      height: 1px;
      background: #1e3045;
      margin: 24px 0;
    }

    .steps {
      text-align: left;
    }

    .steps h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #5a7a8a;
      margin-bottom: 12px;
    }

    .step {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 13px;
      color: #8aa0b0;
    }

    .step span:first-child {
      color: #00b4ff;
      font-weight: 700;
      flex-shrink: 0;
    }

    .error {
      color: #ff5252;
      font-size: 13px;
      margin-top: 8px;
    }
  </style>
</head>

<body>
  <div class="card">
    <img src="https://github.com/user-attachments/assets/09ee49d2-f760-4237-aedb-9e13b6fd7b75" alt="BSS" />
    <h1>BSS Operation Center</h1>
    <p>Aplikasi monitoring & laporan operasional BSS Parking</p>
    <div class="version" id="version">Memuat...</div>
    <a class="btn" id="btn" href="#">↓ Download APK</a>
    <div class="info" id="info">Mengambil info...</div>
    <div class="error" id="error" style="display:none"></div>
    <div class="divider"></div>
    <div class="steps">
      <h3>Cara Install</h3>
      <div class="step"><span>1.</span><span>Tap tombol Download APK di atas</span></div>
      <div class="step"><span>2.</span><span>Aktifkan <b>Install Unknown Apps</b> di Settings</span></div>
      <div class="step"><span>3.</span><span>Buka file APK dari Downloads lalu tap Install</span></div>
    </div>
  </div>
  <script>
    const btn = document.getElementById('btn');

    fetch('https://api.github.com/repos/Bahana-Cipta-Technology/bss-opr-apk/releases/latest')
      .then(r => r.json())
      .then(data => {
        const asset = data.assets.find(a => a.name === 'app-release.apk');
        if (!asset) throw new Error();

        document.getElementById('version').textContent = data.tag_name;
        document.getElementById('info').textContent =
          (asset.size / 1048576).toFixed(1) + ' MB · ' +
          asset.download_count + ' downloads';

        // LANGSUNG SET HREF (tanpa onclick hack)
        btn.href = 'https://pub-f9aff3bd48844c648eefd60cd793696a.r2.dev/app-release.apk';
        btn.setAttribute('target', '_blank');
        btn.setAttribute('rel', 'noopener');
      })
      .catch(() => {
        document.getElementById('version').textContent = 'Error';
        document.getElementById('info').textContent = '';
        const err = document.getElementById('error');
        err.style.display = 'block';
        err.textContent = '⚠ Gagal memuat. Refresh halaman.';
      });
  </script>
</body>

</html>
